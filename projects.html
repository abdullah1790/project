<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشاريع - Green Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1f0d 0%, #000000 50%, #0a2e0a 100%);
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(145deg, rgba(0, 20, 0, 0.95), rgba(0, 10, 0, 0.98));
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            box-shadow: 0 2px 20px rgba(0, 255, 65, 0.1);
        }

        .logo {
            color: #00ff41;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #4a7c4a;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #00ff41;
            background: rgba(0, 255, 65, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #ff4444;
            border-radius: 6px;
            color: #ff4444;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff4444;
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            color: #00ff41;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
        }

        .page-title p {
            color: #4a7c4a;
            font-size: 16px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: linear-gradient(145deg, rgba(0, 20, 0, 0.9), rgba(0, 10, 0, 0.95));
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 65, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.15);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .project-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #0d3d0d, #1a5c1a);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .project-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .project-status.active {
            background: rgba(0, 255, 65, 0.15);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.3);
        }

        .project-status.completed {
            background: rgba(100, 149, 237, 0.15);
            color: #6495ed;
            border: 1px solid rgba(100, 149, 237, 0.3);
        }

        .project-status.pending {
            background: rgba(255, 165, 0, 0.15);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }

        .project-title {
            color: #00ff41;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .project-desc {
            color: #4a7c4a;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 65, 0.1);
        }

        .project-progress {
            flex: 1;
            margin-right: 20px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(0, 255, 65, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff41, #2d8a2d);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #2d5a2d;
        }

        .project-team {
            display: flex;
            align-items: center;
        }

        .team-avatars {
            display: flex;
        }

        .team-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #0d3d0d, #1a5c1a);
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 65, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #00ff41;
            margin-left: -8px;
        }

        .team-avatar:first-child {
            margin-left: 0;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #1a3d1a;
            font-size: 12px;
            margin-top: 50px;
            border-top: 1px solid rgba(0, 255, 65, 0.1);
        }

        .back-link {
            display: inline-block;
            color: #00ff41;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Green Portal</div>
        <nav class="nav-links">
            <a href="dashboard.html">لوحة التحكم</a>
            <a href="projects.html" class="active">المشاريع</a>
            <a href="members.html">الأعضاء</a>
        </nav>
        <div class="user-info">
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>
    </header>

    <div class="container">
        <a href="dashboard.html" class="back-link">← العودة للوحة التحكم</a>
        
        <div class="page-title">
            <h1>المشاريع</h1>
            <p>قائمة بالمشاريع الجارية والمكتملة</p>
        </div>

        <div class="projects-grid" id="projectsList">
            <!-- Projects will be populated here -->
        </div>
    </div>

    <footer class="footer">
        © 2026 Green Portal. All rights reserved.
    </footer>

    <script>
        // Check if user is logged in
        const isLoggedIn = sessionStorage.getItem('isLoggedIn');

        if (!isLoggedIn) {
            window.location.href = 'index.html';
        }

        // Projects data
        const projects = [
            {
                title: 'تطوير الموقع الإلكتروني',
                description: 'تصميم وتطوير موقع إلكتروني متكامل مع واجهة مستخدم حديثة',
                status: 'active',
                progress: 75,
                team: ['أ', 'س', 'ع']
            },
            {
                title: 'تطبيق الهاتف المحمول',
                description: 'تطبيق جوال متوافق مع أنظمة Android و iOS',
                status: 'active',
                progress: 60,
                team: ['م', 'خ', 'ن']
            },
            {
                title: 'نظام إدارة المخزون',
                description: 'نظام متكامل لإدارة المخزون والمبيعات والمحاسبة',
                status: 'completed',
                progress: 100,
                team: ['ع', 'ه']
            },
            {
                title: 'منصة التعليم الإلكتروني',
                description: 'منصة تعليمية متكاملة مع محتوى تفاعلي',
                status: 'pending',
                progress: 30,
                team: ['ف', 'ع', 'ك']
            },
            {
                title: 'نظام الأمن السيبراني',
                description: 'تطبيق إجراءات الأمن السيبراني وحماية البيانات',
                status: 'active',
                progress: 45,
                team: ['ع', 'ل']
            },
            {
                title: 'تحليل البيانات الضخمة',
                description: 'تحليل كميات كبيرة من البيانات واستخراج أنماط مفيدة',
                status: 'active',
                progress: 85,
                team: ['أ', 'م', 'س']
            }
        ];

        // Get status text
        function getStatusText(status) {
            const texts = {
                'active': 'نشط',
                'completed': 'مكتمل',
                'pending': 'قيد الانتظار'
            };
            return texts[status] || status;
        }

        // Render projects
        function renderProjects() {
            const projectsList = document.getElementById('projectsList');
            projectsList.innerHTML = projects.map(project => `
                <div class="project-card" onclick="openProject('${project.title}')">
                    <div class="project-header">
                        <div class="project-icon">📁</div>
                        <span class="project-status ${project.status}">${getStatusText(project.status)}</span>
                    </div>
                    <h3 class="project-title">${project.title}</h3>
                    <p class="project-desc">${project.description}</p>
                    <div class="project-meta">
                        <div class="project-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${project.progress}%"></div>
                            </div>
                            <span class="progress-text">${project.progress}% مكتمل</span>
                        </div>
                        <div class="project-team">
                            <div class="team-avatars">
                                ${project.team.map(member => `<div class="team-avatar">${member}</div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Open project (placeholder function)
        function openProject(projectName) {
            alert('جاري فتح المشروع: ' + projectName);
        }

        // Render on page load
        renderProjects();

        // Logout function
        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
